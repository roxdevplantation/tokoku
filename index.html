<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
    <!-- Pastikan browser tidak cache index.html terlalu lama -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TokoKu - Inventory</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- ── Offline banner ── -->
  <div id="offline-banner">📶 Offline — data tersimpan lokal, sync otomatis saat internet ada</div>

  <!-- ── Top bar ── -->
  <div id="topbar">
    <span class="logo">Toko Lena <p>build: by@rockyV1.0</p></span>
    <span class="page-title" id="page-title">Dashboard</span>
    <div id="sync-status">
      <div id="sync-dot"></div>
      <span id="sync-text">…</span>
    </div>
  </div>

  <!-- ── Main content ── -->
  <div id="content"></div>

  <!-- ── Bottom navigation ── -->
 <nav id="bottomnav">
  <button class="nav-btn active" data-page="dashboard" onclick="navigate('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <span>Dashboard</span>
  </button>
  <button class="nav-btn" data-page="barang" onclick="navigate('barang')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Barang</span>
  </button>
  <button class="nav-btn" data-page="transaksi" onclick="navigate('transaksi')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
    </svg>
    <span>Transaksi</span>
  </button>
  <button class="nav-btn" data-page="piutang" onclick="navigate('piutang')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 00-3-3.87m-4-12a4 4 0 010 7.75"/>
    </svg>
    <span>Piutang</span>
  </button>
  <button class="nav-btn" data-page="log" onclick="navigate('log')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 00-2 2v16a 2 2 0 002 2h12a2 2 0 002-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
    <span>Log</span>
  </button>
</nav>


        <!-- ── Modals ── -->
<div class="modal-overlay" id="modal-barang">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-barang-title">Tambah Barang</div>
    <div id="modal-barang-body"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-transaksi">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Transaksi Baru</div>
    <div id="modal-transaksi-body"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-detail">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-detail-title">Detail</div>
    <div id="modal-detail-body"></div>
  </div>
</div>

<!-- ── Global toast ── -->
<div id="toast"></div>

<!-- ── App entry point (ES modules) ── -->
<script type="module" src="app.js"></script>
</body>
</html>
